<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ActionTracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.3px;
    }

    header h1 span { color: #6366f1; }

    #last-updated {
      font-size: 0.78rem;
      color: #64748b;
    }

    .stats-bar {
      display: flex;
      gap: 12px;
      padding: 20px 32px;
      flex-wrap: wrap;
    }

    .stat {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 14px 20px;
      min-width: 110px;
      text-align: center;
    }

    .stat .number {
      font-size: 1.8rem;
      font-weight: 700;
      line-height: 1;
    }

    .stat .label {
      font-size: 0.72rem;
      color: #64748b;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat.stale .number    { color: #ef4444; }
    .stat.watch .number    { color: #f59e0b; }
    .stat.open .number     { color: #6366f1; }
    .stat.inprogress .number { color: #3b82f6; }
    .stat.blocked .number  { color: #f97316; }
    .stat.done .number     { color: #22c55e; }
    .stat.total .number    { color: #e2e8f0; }

    /* ── Filter bar ── */
    .filter-group {
      padding: 0 32px 8px;
    }

    .filter-group-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #475569;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .filter-btn {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 0.8rem;
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover, .filter-btn.active {
      background: #6366f1;
      border-color: #6366f1;
      color: #fff;
    }

    .filter-btn.cat-active {
      background: #1e3a5f;
      border-color: #3b82f6;
      color: #93c5fd;
    }

    /* ── Sections ── */
    .section {
      padding: 0 32px 32px;
    }

    .section-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .items-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── Action Item Cards ── */
    .item-card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 16px 20px;
      display: grid;
      grid-template-columns: 48px 1fr auto;
      gap: 14px;
      align-items: start;
      transition: border-color 0.15s;
    }

    .item-card:hover { border-color: #4d5280; }

    .item-card.stale   { border-left: 3px solid #ef4444; }
    .item-card.watch   { border-left: 3px solid #f59e0b; }
    .item-card.blocked { border-left: 3px solid #f97316; }
    .item-card.done    { opacity: 0.5; }

    .item-id {
      font-size: 0.72rem;
      font-weight: 700;
      color: #6366f1;
      background: #1e2040;
      border-radius: 6px;
      padding: 4px 8px;
      text-align: center;
      font-family: monospace;
      margin-top: 2px;
    }

    /* Title + description block */
    .item-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 4px;
      line-height: 1.35;
    }

    .item-desc {
      font-size: 0.82rem;
      color: #94a3b8;
      margin-bottom: 8px;
      line-height: 1.45;
    }

    .item-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .meta-tag {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 500;
    }

    .tag-owner    { background: #1e3a5f; color: #60a5fa; }
    .tag-source   { background: #1e2a1e; color: #4ade80; }
    .tag-category { background: #2a1e40; color: #c084fc; }
    .tag-priority-high   { background: #3b1212; color: #f87171; }
    .tag-priority-medium { background: #2a2612; color: #fbbf24; }
    .tag-priority-low    { background: #1a2635; color: #7dd3fc; }

    /* Right column: status + staleness */
    .item-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      padding-top: 2px;
    }

    .status-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .status-open       { background: #1e2040; color: #818cf8; }
    .status-inprogress { background: #1e3055; color: #60a5fa; }
    .status-blocked    { background: #2d1f0e; color: #fb923c; }
    .status-done       { background: #0f2a1a; color: #4ade80; }

    .staleness-label { font-size: 0.68rem; white-space: nowrap; }
    .staleness-stale { color: #ef4444; font-weight: 600; }
    .staleness-watch { color: #f59e0b; }
    .staleness-fresh { color: #64748b; }

    .no-items {
      background: #1a1d27;
      border: 1px dashed #2d3148;
      border-radius: 10px;
      padding: 28px;
      text-align: center;
      color: #64748b;
      font-size: 0.85rem;
    }

    /* ── Decision cards ── */
    .decisions-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .decision-card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-left: 3px solid #a855f7;
      border-radius: 10px;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .decision-id {
      font-size: 0.72rem;
      font-weight: 700;
      color: #a855f7;
      font-family: monospace;
      white-space: nowrap;
    }

    .decision-desc {
      font-size: 0.88rem;
      color: #cbd5e1;
      flex: 1;
    }

    .decision-date {
      font-size: 0.7rem;
      color: #64748b;
      white-space: nowrap;
    }

    footer {
      text-align: center;
      padding: 24px;
      font-size: 0.72rem;
      color: #374151;
      border-top: 1px solid #1e2030;
    }

    @media (max-width: 600px) {
      header, .stats-bar, .filter-group, .section { padding-left: 16px; padding-right: 16px; }
      .item-card { grid-template-columns: 40px 1fr; }
      .item-right { display: none; }
    }
  </style>
</head>
<body>

<header>
  <h1>Action<span>Tracker</span></h1>
  <span id="last-updated">Loading...</span>
</header>

<div class="stats-bar" id="stats-bar"></div>

<div class="filter-group">
  <div class="filter-group-label">Status</div>
  <div class="filters" id="status-filters">
    <button class="filter-btn active" onclick="setStatusFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setStatusFilter('stale', this)">🔴 Stale</button>
    <button class="filter-btn" onclick="setStatusFilter('Open', this)">Open</button>
    <button class="filter-btn" onclick="setStatusFilter('In Progress', this)">In Progress</button>
    <button class="filter-btn" onclick="setStatusFilter('Blocked', this)">Blocked</button>
    <button class="filter-btn" onclick="setStatusFilter('Done', this)">Done</button>
  </div>
  <div class="filter-group-label">Category</div>
  <div class="filters" id="category-filters">
    <button class="filter-btn cat-active" onclick="setCategoryFilter('all', this)">All Categories</button>
  </div>
</div>

<div class="section" id="items-section">
  <div class="section-title">Action Items</div>
  <div class="items-grid" id="items-container">
    <div class="no-items">Loading action items...</div>
  </div>
</div>

<div class="section" id="decisions-section">
  <div class="section-title">Unresolved Decisions</div>
  <div class="decisions-grid" id="decisions-container">
    <div class="no-items">Loading decisions...</div>
  </div>
</div>

<footer>ActionTracker &mdash; powered by Cowork &amp; Claude</footer>

<script>
  let allItems = [];
  let statusFilter = 'all';
  let categoryFilter = 'all';

  function businessDaysSince(dateStr) {
    const start = new Date(dateStr);
    const today = new Date();
    let count = 0;
    let d = new Date(start);
    while (d < today) {
      d.setDate(d.getDate() + 1);
      const day = d.getDay();
      if (day !== 0 && day !== 6) count++;
    }
    return count;
  }

  function getStaleness(item) {
    if (item.status === 'Done') return { level: 'done', days: 0 };
    const days = businessDaysSince(item.lastUpdated);
    if (days >= 6) return { level: 'stale', days };
    if (days >= 3) return { level: 'watch', days };
    return { level: 'fresh', days };
  }

  function setStatusFilter(f, btn) {
    statusFilter = f;
    document.querySelectorAll('#status-filters .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderItems();
  }

  function setCategoryFilter(f, btn) {
    categoryFilter = f;
    document.querySelectorAll('#category-filters .filter-btn').forEach(b => b.classList.remove('cat-active'));
    btn.classList.add('cat-active');
    renderItems();
  }

  function buildCategoryFilters(items) {
    const cats = ['all', ...new Set(items.map(i => i.category).filter(Boolean).sort())];
    const bar = document.getElementById('category-filters');
    bar.innerHTML = cats.map(c => {
      const label = c === 'all' ? 'All Categories' : c;
      const active = c === 'all' ? 'cat-active' : '';
      return `<button class="filter-btn ${active}" onclick="setCategoryFilter('${c}', this)">${label}</button>`;
    }).join('');
  }

  function renderStats(items) {
    const staleCount = items.filter(i => i.status !== 'Done' && businessDaysSince(i.lastUpdated) >= 6).length;
    const watchCount = items.filter(i => i.status !== 'Done' && businessDaysSince(i.lastUpdated) >= 3 && businessDaysSince(i.lastUpdated) < 6).length;
    const open     = items.filter(i => i.status === 'Open').length;
    const inprog   = items.filter(i => i.status === 'In Progress').length;
    const blocked  = items.filter(i => i.status === 'Blocked').length;
    const done     = items.filter(i => i.status === 'Done').length;

    document.getElementById('stats-bar').innerHTML = `
      <div class="stat total">    <div class="number">${items.length}</div><div class="label">Total</div></div>
      <div class="stat stale">    <div class="number">${staleCount}</div><div class="label">Stale</div></div>
      <div class="stat watch">    <div class="number">${watchCount}</div><div class="label">Watch</div></div>
      <div class="stat open">     <div class="number">${open}</div><div class="label">Open</div></div>
      <div class="stat inprogress"><div class="number">${inprog}</div><div class="label">In Progress</div></div>
      <div class="stat blocked">  <div class="number">${blocked}</div><div class="label">Blocked</div></div>
      <div class="stat done">     <div class="number">${done}</div><div class="label">Done</div></div>
    `;
  }

  function renderItems() {
    const container = document.getElementById('items-container');
    let filtered = allItems;

    // Apply status filter
    if (statusFilter === 'stale') {
      filtered = filtered.filter(i => i.status !== 'Done' && businessDaysSince(i.lastUpdated) >= 6);
    } else if (statusFilter !== 'all') {
      filtered = filtered.filter(i => i.status === statusFilter);
    }

    // Apply category filter
    if (categoryFilter !== 'all') {
      filtered = filtered.filter(i => i.category === categoryFilter);
    }

    if (filtered.length === 0) {
      container.innerHTML = `<div class="no-items">No items match this filter.</div>`;
      return;
    }

    container.innerHTML = filtered.map(item => {
      const staleness  = getStaleness(item);
      const cardClass  = staleness.level === 'done' ? 'done' : staleness.level;
      const stalenessHTML = item.status === 'Done'
        ? `<span class="staleness-label staleness-fresh">Closed</span>`
        : staleness.level === 'stale'
          ? `<span class="staleness-label staleness-stale">⚨ ${staleness.days}d stale</span>`
          : staleness.level === 'watch'
            ? `<span class="staleness-label staleness-watch">👁 ${staleness.days}d</span>`
            : `<span class="staleness-label staleness-fresh">${staleness.days}d ago</span>`;

      const statusClass  = item.status.toLowerCase().replace(' ', '');
      const priorityClass = `tag-priority-${item.priority.toLowerCase()}`;
      const categoryTag  = item.category
        ? `<span class="meta-tag tag-category">${item.category}</span>`
        : '';

      const titleHTML = item.title
        ? `<div class="item-title">${item.title}</div>`
        : '';
      const descHTML = item.description
        ? `<div class="item-desc">${item.description}</div>`
        : '';

      return `
        <div class="item-card ${cardClass}">
          <div class="item-id">${item.id}</div>
          <div class="item-body">
            ${titleHTML}
            ${descHTML}
            <div class="item-meta">
              ${categoryTag}
              <span class="meta-tag tag-owner">${item.owner}</span>
              <span class="meta-tag tag-source">${item.source}</span>
              <span class="meta-tag ${priorityClass}">${item.priority}</span>
            </div>
          </div>
          <div class="item-right">
            <span class="status-badge status-${statusClass}">${item.status}</span>
            ${stalenessHTML}
          </div>
        </div>
      `;
    }).join('');
  }

  function renderDecisions(decisions) {
    const container = document.getElementById('decisions-container');
    const open = decisions.filter(d => d.status === 'Open');
    if (open.length === 0) {
      container.innerHTML = `<div class="no-items">No unresolved decisions.</div>`;
      return;
    }
    container.innerHTML = open.map(d => `
      <div class="decision-card">
        <span class="decision-id">${d.id}</span>
        <span class="decision-desc">${d.description}</span>
        <span class="decision-date">${d.raised}</span>
      </div>
    `).join('');
  }

  async function loadData() {
    try {
      const res  = await fetch('data.json?v=' + Date.now());
      const data = await res.json();
      allItems   = data.items || [];
      const decisions = data.decisions || [];

      document.getElementById('last-updated').textContent = `Last updated: ${data.lastUpdated || 'unknown'}`;
      renderStats(allItems);
      buildCategoryFilters(allItems);
      renderItems();
      renderDecisions(decisions);
    } catch (e) {
      document.getElementById('items-container').innerHTML = `
        <div class="no-items">
          Could not load data.json. Make sure it exists in the same folder as this file.<br/>
          <small style="color:#374151;margin-top:4px;display:block;">Error: ${e.message}</small>
        </div>`;
    }
  }

  loadData();
  setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
